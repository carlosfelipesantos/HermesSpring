<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes – Entrar</title>
<link rel="stylesheet" href="../css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
    background:
        radial-gradient(circle at top left, rgba(52,211,153,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(4,85,58,0.24), transparent 34%),
        linear-gradient(135deg, #033726 0%, #04553a 35%, #0b7b55 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
}
.login-container { width: 100%; max-width: 470px; animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1); }
.login-card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    border-radius: 28px; padding: 2.75rem 2.25rem 2rem;
    box-shadow: 0 24px 60px rgba(0,0,0,0.18), 0 8px 24px rgba(4,85,58,0.14);
    border: 1px solid rgba(255,255,255,0.35);
}
.login-header { text-align: center; margin-bottom: 2rem; }
.login-logo { font-size: 2.2rem; font-weight: 800; color: var(--primary); letter-spacing: -0.04em; margin-bottom: 0.5rem; }
.login-title { font-size: 1.8rem; font-weight: 800; color: #17211d; margin-bottom: 0.3rem; }
.login-subtitle { color: #6e7f78; font-size: 0.95rem; font-family: 'DM Sans', sans-serif; }
.login-form { display: flex; flex-direction: column; gap: 1.1rem; }
.form-floating { position: relative; }
.form-floating input {
    width: 100%; padding: 1.6rem 3rem 0.7rem 1.1rem;
    border: 1.5px solid #dce5e1; border-radius: 18px;
    background: #f9fbfa; font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem; font-weight: 600; color: #18201d; outline: none;
    transition: var(--transition);
}
.form-floating input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(4,85,58,0.1); }
.form-floating label {
    position: absolute; top: 50%; left: 1.1rem;
    transform: translateY(-50%);
    display: flex; align-items: center; gap: 0.4rem;
    color: #7a8a84; font-size: 0.95rem; font-weight: 500;
    pointer-events: none; transition: all 0.22s ease;
}
.form-floating input:focus ~ label,
.form-floating input:not(:placeholder-shown) ~ label {
    top: 0.75rem; transform: translateY(0);
    font-size: 0.74rem; font-weight: 700; color: var(--primary);
}
.password-toggle {
    position: absolute; top: 50%; right: 0.8rem; transform: translateY(-50%);
    background: none; border: none; color: #6c7b75; cursor: pointer;
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
}
.password-toggle:hover { background: #edf4f0; color: var(--primary); }
.btn-login {
    width: 100%; min-height: 56px; padding: 1rem;
    border: none; border-radius: 18px; cursor: pointer;
    background: linear-gradient(135deg, #04553a 0%, #0d7a55 60%, #14b87a 100%);
    color: #fff; font-family: 'Space Grotesk', sans-serif;
    font-size: 1.02rem; font-weight: 700;
    box-shadow: 0 16px 30px rgba(4,85,58,0.24);
    transition: var(--transition); position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
}
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 22px 40px rgba(4,85,58,0.28); }
.btn-login:disabled { opacity: 0.7; transform: none; }
.btn-shine {
    position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 20%, rgba(255,255,255,0.25) 45%, transparent 70%);
    transform: translateX(-120%); transition: transform 0.7s ease;
}
.btn-login:hover .btn-shine { transform: translateX(120%); }
.form-options { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.forgot-link { color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: 700; }
.forgot-link:hover { color: var(--accent); }
.register-note { text-align: center; color: #6f7f78; font-size: 0.92rem; font-family: 'DM Sans', sans-serif; }
.register-note a { color: var(--primary); font-weight: 700; text-decoration: none; }
.register-note a:hover { color: var(--accent); }
.login-footer { margin-top: 1.4rem; padding-top: 1.1rem; border-top: 1px solid #e8efeb; text-align: center; font-size: 0.88rem; color: #72817b; font-family: 'DM Sans', sans-serif; }
.login-footer a { color: var(--primary); text-decoration: none; font-weight: 700; }
#alertBox { margin-bottom: 1rem; }

/* tipo de usuário */
.tipo-group { display: flex; gap: 0.75rem; }
.tipo-opt {
    flex: 1; padding: 0.75rem 1rem;
    border: 2px solid #dce5e1; border-radius: 14px;
    cursor: pointer; text-align: center;
    font-weight: 600; font-size: 0.9rem; color: #7a8a84;
    transition: var(--transition); background: #f9fbfa;
}
.tipo-opt.active { border-color: var(--primary); background: rgba(4,85,58,0.06); color: var(--primary); }
.tipo-opt i { display: block; font-size: 1.3rem; margin-bottom: 0.3rem; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">HERMES</div>
      <h1 class="login-title">Bem-vindo</h1>
      <p class="login-subtitle">Entre em sua conta para continuar</p>
    </div>

    <div id="alertBox"></div>

    <div class="tipo-group" style="margin-bottom:1.1rem;">
      <div class="tipo-opt active" id="tipo-cliente" onclick="setTipo('CLIENTE')">
        <i class="fas fa-user"></i> Cliente
      </div>
      <div class="tipo-opt" id="tipo-transportador" onclick="setTipo('TRANSPORTADOR')">
        <i class="fas fa-truck"></i> Transportador
      </div>
    </div>

    <form class="login-form" id="loginForm" onsubmit="doLogin(event)">
      <div class="form-floating">
        <input type="email" id="email" placeholder=" " required>
        <label><i class="fas fa-envelope"></i> E-mail</label>
      </div>
      <div class="form-floating">
        <input type="password" id="senha" placeholder=" " required>
        <label><i class="fas fa-lock"></i> Senha</label>
        <button type="button" class="password-toggle" onclick="togglePass()">
          <i class="fas fa-eye" id="passIcon"></i>
        </button>
      </div>

      <div class="form-options">
        <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.9rem;color:#66756f;cursor:pointer;">
          <input type="checkbox" id="lembrar"> Lembrar de mim
        </label>
        <a href="#" class="forgot-link">Esqueci a senha</a>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span id="loginBtnText">Entrar</span>
        <i class="fas fa-sign-in-alt"></i>
        <div class="btn-shine"></div>
      </button>

      <p class="register-note">Não possui conta? <a href="cadastro.html">Cadastre-se</a></p>
    </form>

    <div class="login-footer">
      <a href="../index.html">← Voltar para a página inicial</a>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
let tipoSelecionado = 'CLIENTE';

function setTipo(t) {
    tipoSelecionado = t;
    document.getElementById('tipo-cliente').classList.toggle('active', t === 'CLIENTE');
    document.getElementById('tipo-transportador').classList.toggle('active', t === 'TRANSPORTADOR');
}

function togglePass() {
    const inp = document.getElementById('senha');
    const ico = document.getElementById('passIcon');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    ico.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
}

async function doLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn   = document.getElementById('loginBtn');
    const alert = document.getElementById('alertBox');

    btn.disabled = true;
    document.getElementById('loginBtnText').textContent = 'Entrando...';

    try {
        const endpoint = tipoSelecionado === 'CLIENTE'
            ? '/auth/cliente/login'
            : '/auth/transportador/login';

        const user = await apiFetch(endpoint, {
            method: 'POST',
            body: JSON.stringify({ email, senha })
        });

        Auth.save({ id: user.id, nome: user.nome, email: user.email, role: user.role });
        location.href = user.role === 'CLIENTE' ? 'solicitar-frete.html' : 'fretes-disponiveis.html';

    } catch (err) {
        showAlert(alert, err.message, 'error');
        btn.disabled = false;
        document.getElementById('loginBtnText').textContent = 'Entrar';
    }
}

// Se já logado com dados válidos, redireciona
if (Auth.isLoggedIn()) {
    const role = Auth.getRole();
    if (role === 'CLIENTE') location.href = 'solicitar-frete.html';
    else if (role === 'TRANSPORTADOR') location.href = 'fretes-disponiveis.html';
    else Auth.clear(); // role inválido: limpa e deixa fazer login
}
</script>
</body>
</html>
