<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes – Criar Conta</title>
<link rel="stylesheet" href="../css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
    background:
        radial-gradient(circle at top left, rgba(52,211,153,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(4,85,58,0.24), transparent 34%),
        linear-gradient(135deg, #033726 0%, #04553a 35%, #0b7b55 100%);
    min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 2rem 1rem;
}
.login-container { width: 100%; max-width: 500px; animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1); }
.login-card {
    background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
    border-radius: 28px; padding: 2.5rem 2rem;
    box-shadow: 0 24px 60px rgba(0,0,0,0.18), 0 8px 24px rgba(4,85,58,0.14);
    border: 1px solid rgba(255,255,255,0.35);
}
.login-header { text-align: center; margin-bottom: 1.8rem; }
.login-logo { font-size: 2rem; font-weight: 800; color: var(--primary); letter-spacing: -0.04em; margin-bottom: 0.4rem; }
.login-title { font-size: 1.6rem; font-weight: 800; color: #17211d; }
.login-subtitle { color: #6e7f78; font-size: 0.92rem; font-family: 'DM Sans', sans-serif; margin-top: 0.3rem; }
.login-form { display: flex; flex-direction: column; gap: 0.9rem; }
.form-floating { position: relative; }
.form-floating input, .form-floating select {
    width: 100%; padding: 1.5rem 1rem 0.65rem 1.1rem;
    border: 1.5px solid #dce5e1; border-radius: 16px;
    background: #f9fbfa; font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem; font-weight: 600; color: #18201d; outline: none;
    transition: var(--transition); appearance: none;
}
.form-floating input:focus, .form-floating select:focus {
    border-color: var(--primary); background: #fff;
    box-shadow: 0 0 0 4px rgba(4,85,58,0.1);
}
.form-floating label {
    position: absolute; top: 50%; left: 1.1rem; transform: translateY(-50%);
    display: flex; align-items: center; gap: 0.4rem;
    color: #7a8a84; font-size: 0.9rem; font-weight: 500;
    pointer-events: none; transition: all 0.22s ease;
}
.form-floating input:focus ~ label,
.form-floating input:not(:placeholder-shown) ~ label,
.form-floating select:focus ~ label,
.form-floating select.has-value ~ label {
    top: 0.7rem; transform: translateY(0); font-size: 0.72rem; font-weight: 700; color: var(--primary);
}
.tipo-group { display: flex; gap: 0.75rem; }
.tipo-opt {
    flex: 1; padding: 0.8rem 1rem; border: 2px solid #dce5e1; border-radius: 14px;
    cursor: pointer; text-align: center; font-weight: 600; font-size: 0.88rem; color: #7a8a84;
    transition: var(--transition); background: #f9fbfa;
}
.tipo-opt.active { border-color: var(--primary); background: rgba(4,85,58,0.06); color: var(--primary); }
.tipo-opt i { display: block; font-size: 1.2rem; margin-bottom: 0.25rem; }
.btn-cadastro {
    width: 100%; min-height: 54px; border: none; border-radius: 16px; cursor: pointer;
    background: linear-gradient(135deg, #04553a 0%, #0d7a55 60%, #14b87a 100%);
    color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 700;
    box-shadow: 0 14px 28px rgba(4,85,58,0.22);
    transition: var(--transition); position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
}
.btn-cadastro:hover { transform: translateY(-2px); }
.btn-cadastro:disabled { opacity: 0.7; transform: none; }
.btn-shine { position: absolute; inset: 0; background: linear-gradient(110deg, transparent 20%, rgba(255,255,255,0.25) 45%, transparent 70%); transform: translateX(-120%); transition: transform 0.7s; }
.btn-cadastro:hover .btn-shine { transform: translateX(120%); }
.register-note { text-align: center; color: #6f7f78; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; }
.register-note a { color: var(--primary); font-weight: 700; text-decoration: none; }
.login-footer { margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid #e8efeb; text-align: center; font-size: 0.85rem; color: #72817b; font-family: 'DM Sans', sans-serif; }
.login-footer a { color: var(--primary); text-decoration: none; font-weight: 700; }
#alertBox { margin-bottom: 0.8rem; }
.flex-row { display: flex; gap: 0.75rem; }
.flex-row > .form-floating { flex: 1; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">HERMES</div>
      <h1 class="login-title">Crie sua conta</h1>
      <p class="login-subtitle">Preencha os campos abaixo para começar</p>
    </div>

    <div id="alertBox"></div>

    <!-- Tipo -->
    <div class="tipo-group" style="margin-bottom:1rem;">
      <div class="tipo-opt active" id="tipo-cliente" onclick="setTipo('CLIENTE')">
        <i class="fas fa-user"></i> Cliente
      </div>
      <div class="tipo-opt" id="tipo-transportador" onclick="setTipo('TRANSPORTADOR')">
        <i class="fas fa-truck"></i> Transportador
      </div>
    </div>

    <form class="login-form" id="cadastroForm" onsubmit="doCadastro(event)">
      <div class="form-floating">
        <input type="text" id="nome" placeholder=" " required>
        <label><i class="fas fa-user"></i> Nome completo</label>
      </div>
      <div class="form-floating">
        <input type="email" id="email" placeholder=" " required>
        <label><i class="fas fa-envelope"></i> E-mail</label>
      </div>
      <div class="form-floating">
        <input type="text" id="telefone" placeholder=" " oninput="mascaraTel(this)">
        <label><i class="fas fa-phone"></i> Telefone</label>
      </div>
        <div class="form-floating">
            <input type="password" id="senha" placeholder=" " required minlength="6">
            <label><i class="fas fa-lock"></i> Senha</label>
        </div>
      <button type="submit" class="btn-cadastro" id="cadastroBtn">
        <span id="cadastroBtnText">Cadastrar</span>
        <i class="fas fa-user-plus"></i>
        <div class="btn-shine"></div>
      </button>

      <p class="register-note">Já possui conta? <a href="login.html">Entrar</a></p>
    </form>

    <div class="login-footer">
      <a href="../index.html">← Voltar para a página inicial</a>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
let tipoSelecionado = 'CLIENTE';

function setTipo(t) {
    tipoSelecionado = t;
    document.getElementById('tipo-cliente').classList.toggle('active', t === 'CLIENTE');
    document.getElementById('tipo-transportador').classList.toggle('active', t === 'TRANSPORTADOR');
}

function mascaraTel(el) {
    let v = el.value.replace(/\D/g,'');
    if (v.length <= 10) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/,'($1) $2-$3');
    else v = v.replace(/(\d{2})(\d{5})(\d{0,4})/,'($1) $2-$3');
    el.value = v.trim().replace(/-$/,'');
}

async function doCadastro(e) {
    e.preventDefault();
    const alertBox = document.getElementById('alertBox');
    const btn      = document.getElementById('cadastroBtn');
    const nome     = document.getElementById('nome').value.trim();
    const email    = document.getElementById('email').value.trim();
    const telefone = document.getElementById('telefone').value.trim();
    const senha    = document.getElementById('senha').value;

    if (!nome || !email || !senha) return showAlert(alertBox, 'Nome, e-mail e senha são obrigatórios.', 'error');
    if (senha.length < 6) return showAlert(alertBox, 'A senha deve ter pelo menos 6 caracteres.', 'error');

    btn.disabled = true;
    document.getElementById('cadastroBtnText').textContent = 'Cadastrando...';

    try {
        const endpoint = tipoSelecionado === 'CLIENTE' ? '/clientes' : '/transportadores';
        const user = await apiFetch(endpoint, {
            method: 'POST',
            body: JSON.stringify({ nome, email, telefone, senha })
        });

        Auth.save({ id: user.id, nome: user.nome, email: user.email, role: tipoSelecionado });
        showAlert(alertBox, 'Cadastro realizado com sucesso! Redirecionando...', 'success');
        setTimeout(() => {
            location.href = tipoSelecionado === 'CLIENTE' ? 'solicitar-frete.html' : 'fretes-disponiveis.html';
        }, 1200);

    } catch (err) {
        showAlert(alertBox, err.message, 'error');
        btn.disabled = false;
        document.getElementById('cadastroBtnText').textContent = 'Cadastrar';
    }
}
</script>
</body>
</html>
